[database]
host = localhost
port = 3306
user = root
password = 123456
database = bilibili_data

[crawler]
start_url = https://www.bilibili.com/
max_threads = 5
timeout = 10
retry_times = 3
user_agent = Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/124.0.0.0 Safari/537.36

[log]
level = INFO
file = logs/crawler.log